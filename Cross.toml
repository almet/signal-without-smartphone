# pre-build commands run inside the cross Docker container (Debian-based),
# regardless of the compilation target (including Windows).
[target.aarch64-unknown-linux-gnu]
pre-build = [
    "apt-get update && apt-get install -y protobuf-compiler"
]

[target.x86_64-pc-windows-gnu]
pre-build = [
    "apt-get update && apt-get install -y protobuf-compiler"
]
