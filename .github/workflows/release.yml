name: Release Builds

on:
  push:
    tags:
      - 'v*'  # Trigger on version tags like v1.0.0, v0.1.2, etc.

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.target }}
    # Auto-detect platform: GitHub uses ubuntu-latest, Codeberg uses codeberg-medium
    runs-on: ${{ contains(github.server_url, 'github.com') && 'ubuntu-latest' || 'codeberg-medium' }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux x86_64 (native)
          - target: x86_64-unknown-linux-gnu
            artifact_name: signal-setup
            asset_name: signal-setup-linux-amd64

          # Linux ARM64 (cross-compiled)
          - target: aarch64-unknown-linux-gnu
            artifact_name: signal-setup
            asset_name: signal-setup-linux-arm64
            cross: true

          # Windows x86_64 (cross-compiled via MinGW)
          - target: x86_64-pc-windows-gnu
            artifact_name: signal-setup.exe
            asset_name: signal-setup-windows-amd64.exe
            cross: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y \
            --default-toolchain stable \
            --target ${{ matrix.target }} \
            --no-modify-path
          echo "${HOME}/.cargo/bin" >> "${GITHUB_PATH}"

      - name: Install cross-compilation tools
        if: ${{ matrix.cross }}
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Install Linux dependencies
        if: ${{ !matrix.cross }}
        run: |
          sudo apt-get update
          sudo apt-get install -y libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev libxkbcommon-dev libssl-dev

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo index
        uses: actions/cache@v4
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-index-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo build
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ runner.os }}-cargo-build-target-${{ matrix.target }}-${{ hashFiles('**/Cargo.lock') }}

      - name: Build with cross
        if: ${{ matrix.cross }}
        run: cross build --release --target ${{ matrix.target }}

      - name: Build
        if: ${{ !matrix.cross }}
        run: cargo build --release --target ${{ matrix.target }}

      - name: Rename binary
        run: |
          mv target/${{ matrix.target }}/release/${{ matrix.artifact_name }} \
             target/${{ matrix.target }}/release/${{ matrix.asset_name }}

      - name: Upload artifact
        if: ${{ contains(github.server_url, 'github.com') }}
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: target/${{ matrix.target }}/release/${{ matrix.asset_name }}

      - name: Upload asset to Forgejo release
        if: ${{ !contains(github.server_url, 'github.com') }}
        env:
          FORGEJO_TOKEN: ${{ secrets.FORGEJO_TOKEN }}
        run: |
          TAG="${{ github.ref_name }}"
          REPO_API="${{ github.server_url }}/api/v1/repos/${{ github.repository }}"
          GITHUB_RELEASE_BASE="https://github.com/almet/signal-without-smartphone/releases/download/${TAG}"
          RELEASE_BODY=$'macOS downloads (hosted on GitHub):\n- Intel (x86_64): '"${GITHUB_RELEASE_BASE}/signal-setup-macos-intel"$'\n- Apple Silicon (arm64): '"${GITHUB_RELEASE_BASE}/signal-setup-macos-silicon"

          RELEASE=$(curl -s -H "Authorization: token ${FORGEJO_TOKEN}" "${REPO_API}/releases/tags/${TAG}" || true)
          RELEASE_ID=$(echo "$RELEASE" | jq -r '.id // empty')

          if [ -z "$RELEASE_ID" ]; then
            RELEASE_PAYLOAD=$(jq -n \
              --arg tag "${TAG}" \
              --arg body "${RELEASE_BODY}" \
              '{tag_name: $tag, name: ("Release " + $tag), draft: false, prerelease: false, body: $body}')

            RELEASE=$(curl -s -X POST \
              -H "Authorization: token ${FORGEJO_TOKEN}" \
              -H "Content-Type: application/json" \
              "${REPO_API}/releases" \
              -d "${RELEASE_PAYLOAD}")
            RELEASE_ID=$(echo "$RELEASE" | jq -r '.id // empty')
          fi

          if [ -z "$RELEASE_ID" ]; then
            echo "Failed to create or fetch release"
            exit 1
          fi

          FILE="target/${{ matrix.target }}/release/${{ matrix.asset_name }}"
          FILENAME="${{ matrix.asset_name }}"
          echo "Uploading ${FILENAME}..."
          curl -s -X POST \
            -H "Authorization: token ${FORGEJO_TOKEN}" \
            -H "Content-Type: application/octet-stream" \
            "${REPO_API}/releases/${RELEASE_ID}/assets?name=${FILENAME}" \
            --data-binary @"$FILE"

  build-macos:
    name: Build ${{ matrix.target }}
    # macOS runners are only available on GitHub — skipped entirely on Codeberg
    if: ${{ contains(github.server_url, 'github.com') }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS Intel — cross-compiled on Apple Silicon runner
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact_name: signal-setup
            asset_name: signal-setup-macos-intel

          # macOS Silicon — native build on ARM runner
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact_name: signal-setup
            asset_name: signal-setup-macos-silicon

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y \
            --default-toolchain stable \
            --no-modify-path
          echo "${HOME}/.cargo/bin" >> "${GITHUB_PATH}"
          rustup target add ${{ matrix.target }}

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo index
        uses: actions/cache@v4
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-index-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo build
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ runner.os }}-cargo-build-target-${{ matrix.target }}-${{ hashFiles('**/Cargo.lock') }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Rename binary
        run: |
          mv target/${{ matrix.target }}/release/${{ matrix.artifact_name }} \
             target/${{ matrix.target }}/release/${{ matrix.asset_name }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: target/${{ matrix.target }}/release/${{ matrix.asset_name }}

  create-release:
    name: Create Release
    needs: [build, build-macos]
    if: ${{ contains(github.server_url, 'github.com') && needs.build.result == 'success' && needs.build-macos.result == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: ls -R artifacts/

      # GitHub
      - name: Create GitHub Release
        if: ${{ contains(github.server_url, 'github.com') }}
        uses: softprops/action-gh-release@v1
        with:
          files: artifacts/*/*
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
